[package]
name = "seqrets-desktop"
version = "1.11.9"
description = "seQRets — Secure. Split. Share."
authors = ["seQRets"]
license = "AGPL-3.0-or-later"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11", features = [] }
tauri-plugin-log = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
pcsc = "2"
# OS keychain (macOS Keychain / Windows Credential Store / Linux Secret Service)
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
# Cryptography
argon2 = "0.5"
chacha20poly1305 = "0.10"
zeroize = { version = "1", features = ["derive"] }
flate2 = "1"
rand = "0.9"
base64 = "0.22"
# QR code decoding (for dropped PNG/JPEG Qard images — closes a gap where
# WebKit's WKWebView lacks the BarcodeDetector API and jsQR can't reliably
# decode dense QR codes on the JS side).
rqrr = "0.10"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

# In dev builds, compile dependency crates with full optimizations while
# leaving our own code unoptimized for fast incremental builds. Without
# this, image-processing crates like `image` and `rqrr` run 10-50× slower
# in dev than in release, making `npm run desktop:dev` deceptively slow
# at QR decoding.
[profile.dev.package."*"]
opt-level = 3
